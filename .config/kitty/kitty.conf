# Kitty config tuned for macOS, tmux, and Neovim.

# Font / rendering
font_family FiraMono Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 13.0

# macOS terminal behavior
macos_option_as_alt both
macos_titlebar_color background
editor nvim

# Window layout
remember_window_size yes
initial_window_width 120c
initial_window_height 36c
window_padding_width 4
single_window_margin_width 0
window_border_width 1pt
enabled_layouts splits,fat,grid,horizontal,stack,tall,vertical

# Scrolling / selection
scrollback_lines 20000
wheel_scroll_multiplier 4.0
touch_scroll_multiplier 1.0
mouse_hide_wait 3.0
copy_on_select clipboard
strip_trailing_spaces smart

# Shell, tmux, and Neovim compatibility
term xterm-kitty
shell_integration enabled
allow_remote_control no
listen_on none
paste_actions quote-urls-at-prompt,confirm

# URL handling
detect_urls yes
url_style curly
open_url_with default

# Less noise during long terminal sessions
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes

# Kitty splits. Cmd+D / Cmd+Shift+D match common macOS terminal conventions.
map cmd+shift+h launch --location=hsplit --cwd=current
map cmd+shift+v launch --location=vsplit --cwd=current
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current

# Move focus between Kitty panes.
# Physical Windows on the Lenovo keyboard is remapped to Option/Alt by Karabiner.
map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down
