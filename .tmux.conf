##### Terminal / Kitty / Neovim

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB:clipboard:ccolour:cstyle:focus:title"
set -as terminal-overrides ",xterm-kitty:Tc"
set -g allow-passthrough on
set -g focus-events on
set -g extended-keys on
set -g extended-keys-format xterm
set -g set-clipboard on
set-environment -g COLORTERM truecolor
set-environment -g EDITOR nvim
set-environment -g VISUAL nvim

##### Prefixes

set -g prefix C-b
set -g prefix2 C-a
bind-key C-a send-prefix

##### Sessions / windows / panes

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g aggressive-resize on
setw -g automatic-rename on
set -g allow-rename off
set -g set-titles on
set -g set-titles-string "#S:#I:#W"

##### Interaction

set -g mouse on
set -g history-limit 100000
set -sg escape-time 10
set -g repeat-time 600
setw -g mode-keys vi
set -g display-time 2000
set -g display-panes-time 1500

##### Pane and window shortcuts

bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}"

bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3
bind-key -r L resize-pane -R 5

bind-key -r Left select-pane -L
bind-key -r Down select-pane -D
bind-key -r Up select-pane -U
bind-key -r Right select-pane -R

##### Copy mode / clipboard

bind-key [ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/tmux-copy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/tmux-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/tmux-copy"

##### Codex-friendly capture helpers

bind-key P capture-pane -S -3000 \; save-buffer "/tmp/tmux-pane-#{session_name}-#{window_index}-#{pane_index}.log" \; display-message "saved pane history to /tmp"
bind-key O capture-pane -S -3000 \; save-buffer "/tmp/tmux-pane-#{session_name}-#{window_index}-#{pane_index}.log" \; new-window -n pane-log "nvim /tmp/tmux-pane-#{session_name}-#{window_index}-#{pane_index}.log"

##### Status line

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "fg=#c0caf5,bg=#1f2335"
set -g message-style "fg=#c0caf5,bg=#3b4261"
set -g mode-style "fg=#1f2335,bg=#7aa2f7"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-style "fg=#3b4261"
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_current_command} "

set -g status-left-length 40
set -g status-left "#[fg=#1f2335,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1f2335] "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#1f2335,bg=#9ece6a,bold] #I:#W #[fg=#9ece6a,bg=#1f2335]"
set -g status-right-length 100
set -g status-right "#[fg=#7aa2f7]#{pane_current_command} #[fg=#565f89]| #[fg=#a9b1d6]%Y-%m-%d %H:%M "

setw -g monitor-activity on
set -g visual-activity off
set -g bell-action other
